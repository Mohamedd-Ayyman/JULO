name: Nuvora CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "*.md"
      - "client/public/**"
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Server Tests ────────────────────────────────────────────────────────────
  server-test:
    name: Server Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(ping)'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create env file
        run: |
          cat > config.env << 'EOF'
          NODE_ENV=test
          PORT_NUMBER=3001
          SECRET_KEY=test-secret-key-for-testing-only-must-be-64-chars-long-minimum-guaranteed
          CONN_STRING=mongodb://localhost:27017/nuvora_test
          CLIENT_URL=http://localhost:5173
          REDIS_URL=redis://localhost:6379/0
          EOF

      - name: Run tests
        run: npm run test -- --coverage --detectOpenHandles --forceExit
        env:
          NODE_OPTIONS: --experimental-vm-modules

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: server/coverage/
          retention-days: 7

  # ── Client Build ────────────────────────────────────────────────────────────
  client-build:
    name: Client Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create env file
        run: |
          cat > .env << 'EOF'
          VITE_BASE_URL=http://localhost:5000
          EOF

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/
          retention-days: 1

  # ── Server Lint ──────────────────────────────────────────────────────────────
  server-lint:
    name: Server Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Run ESLint
        run: npx eslint controllers/ services/ utils/ --max-warnings 0

  # ── Docker Build (on main only) ──────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [server-test, client-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: server-runner
          push: false
          tags: ${{ secrets.DOCKER_USERNAME }}/nuvora-server:${{ github.sha }},${{ secrets.DOCKER_USERNAME }}/nuvora-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push client
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: client-runner
          push: false
          tags: ${{ secrets.DOCKER_USERNAME }}/nuvora-client:${{ github.sha }},${{ secrets.DOCKER_USERNAME }}/nuvora-client:latest

  # ── Summary ──────────────────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [server-test, client-build, server-lint]
    if: always()

    steps:
      - name: CI Summary
        run: |
          echo "## Nuvora CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Server Tests | ${{ needs.server-test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Client Build | ${{ needs.client-build.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Server Lint | ${{ needs.server-lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY